name: Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  unit-and-contract:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --group test

      - name: Run unit and contract tests
        run: uv run pytest tests/unit tests/contracts -v --tb=short --junitxml=test-results/results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-contract-results
          path: test-results/
          retention-days: 14

  validate-plugin-structure:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate plugin.json
        run: python3 -m json.tool .claude-plugin/plugin.json > /dev/null

      - name: Validate YAML frontmatter in agent and skill files
        run: |
          python3 << 'SCRIPT'
          import pathlib
          import sys

          errors = []
          for pattern in ["agents/*.md", "skills/*/SKILL.md"]:
              for path in sorted(pathlib.Path(".").glob(pattern)):
                  content = path.read_text(encoding="utf-8")
                  if not content.startswith("---"):
                      errors.append(f"{path}: missing opening '---' frontmatter delimiter")
                      continue
                  second = content.find("---", 3)
                  if second == -1:
                      errors.append(f"{path}: missing closing '---' frontmatter delimiter")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)

          print("All agent/skill markdown files have valid frontmatter delimiters.")
          SCRIPT

      - name: Check file line counts
        run: |
          python3 << 'SCRIPT'
          import pathlib

          threshold = 500
          warned = False
          for path in sorted(pathlib.Path(".").rglob("*")):
              if not path.is_file():
                  continue
              if path.suffix not in (".md", ".yml", ".yaml", ".json", ".py", ".txt"):
                  continue
              try:
                  lines = len(path.read_text(encoding="utf-8").splitlines())
              except (UnicodeDecodeError, PermissionError):
                  continue
              if lines > threshold:
                  print(f"::warning file={path}::{path} has {lines} lines (threshold: {threshold})")
                  warned = True

          if not warned:
              print(f"All tracked files are within the {threshold}-line threshold.")
          SCRIPT
