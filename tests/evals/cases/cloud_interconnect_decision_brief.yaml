name: "cloud-interconnect-decision-brief"
description: "Verify decision-brief skill produces a structured brief with evidence/inference separation for cloud interconnect options"
fixture: "cloud_interconnect_vendor_docs"
setup:
  - copy_fixture: "fixtures/cloud_interconnect_vendor_docs.md"
    to: "input/vendor-docs.md"
prompt: |
  First, use the complexity-mapper skill to analyze the vendor documentation in input/vendor-docs.md.
  Write the complexity report to output/complexity-report.md.

  Then, use the decision-brief skill to produce a decision brief based on the complexity report.
  The decision under review is: "Which interconnect option should we use for AWS-to-GCP connectivity
  for a production workload requiring 99.99% availability and at least 10 Gbps throughput?"
  Write the decision brief to output/decision-brief.md.
expected_outcomes:
  - type: file_exists
    files:
      - "output/decision-brief.md"
  - type: section_check
    file: "output/decision-brief.md"
    sections:
      - "decision"
      - "options"
      - "evidence"
      - "risk"
      - "unresolved"
      - "next"
  - type: evidence_labels
    file: "output/decision-brief.md"
    min_source_labels: 3
    min_inferred_labels: 1
  - type: forbidden_patterns
    file: "output/decision-brief.md"
    patterns:
      - "(?i)definitely"
      - "(?i)no risks"
      - "(?i)fully redundant"
      - "(?i)guaranteed to"
grader: composite
timeout: 300
